<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Análisis Psicosocial</title>
    <meta name="description"
        content="Panel de análisis de resultados de la Batería de Riesgo Psicosocial — MinTrabajo Colombia">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --bg-card-hover: #f1f5f9;
            --accent-blue: #2563eb;
            --accent-purple: #7c3aed;
            --accent-cyan: #06b6d4;
            --accent-green: #10b981;
            --accent-orange: #ea580c;
            --accent-red: #ef4444;
            --accent-magenta: #c026d3;
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --glass: rgba(255, 255, 255, 0.95);
            --radius: 14px;
            --shadow: 0 4px 16px rgba(0, 0, 0, 0.04);
            /* Risk level colors */
            --risk-none: #10b981;
            --risk-low: #34d399;
            --risk-medium: #fbbf24;
            --risk-high: #ef4444;
            --risk-very-high: #e81cff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ═══════ AMBIENT BACKGROUND ═══════ */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: -1;
            background:
                radial-gradient(ellipse 600px 600px at 15% 20%, rgba(79, 124, 255, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse 500px 500px at 85% 70%, rgba(124, 77, 255, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse 400px 400px at 50% 50%, rgba(0, 229, 255, 0.04) 0%, transparent 60%);
        }

        /* ═══════ HEADER ═══════ */
        .header {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .header-title .icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .header-title h1 {
            font-size: 18px;
            font-weight: 700;
        }

        .header-title small {
            color: var(--text-muted);
            font-size: 12px;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        /* ═══════ BUTTONS ═══════ */
        .btn {
            padding: 8px 18px;
            border-radius: 10px;
            border: none;
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            color: #fff;
            box-shadow: 0 4px 14px rgba(79, 124, 255, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(79, 124, 255, 0.4);
        }

        .btn-ghost {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .btn-ghost:hover {
            background: var(--bg-card);
            color: var(--text-primary);
        }

        .btn-danger {
            background: var(--accent-red);
            color: #fff;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 8px;
        }

        /* ═══════ LAYOUT ═══════ */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px 32px;
        }

        /* ═══════ FILTER BAR ═══════ */
        .filter-bar {
            display: flex;
            gap: 12px;
            align-items: center;
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 14px 20px;
            margin-bottom: 24px;
            border: 1px solid var(--border);
        }

        .filter-bar label {
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .filter-bar input,
        .filter-bar select {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 8px 14px;
            border-radius: 10px;
            font-family: inherit;
            font-size: 13px;
            width: 200px;
            outline: none;
            transition: border 0.2s;
        }

        .filter-bar input:focus,
        .filter-bar select:focus {
            border-color: var(--accent-blue);
        }

        /* ═══════ KPI CARDS ═══════ */
        .kpi-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .kpi {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            transition: all 0.25s;
            position: relative;
            overflow: hidden;
        }

        .kpi:hover {
            transform: translateY(-2px);
            border-color: var(--accent-blue);
            box-shadow: var(--shadow);
        }

        .kpi::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple));
        }

        .kpi-value {
            font-size: 32px;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 6px;
        }

        .kpi-label {
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* ═══════ GRID LAYOUT ═══════ */
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }

        @media(max-width:900px) {

            .grid-2,
            .grid-3 {
                grid-template-columns: 1fr;
            }
        }

        /* ═══════ CARD ═══════ */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            transition: border-color 0.2s;
        }

        .card:hover {
            border-color: var(--accent-blue);
        }

        .card-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-title .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-cyan);
        }

        /* ═══════ INDIVIDUAL LOOKUP ═══════ */
        .lookup-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 24px;
        }

        .lookup-row {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .lookup-row .field {
            flex: 1;
        }

        .lookup-row .field label {
            display: block;
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .lookup-row .field input {
            width: 100%;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 10px 16px;
            border-radius: 10px;
            font-family: inherit;
            font-size: 14px;
            outline: none;
        }

        .lookup-row .field input:focus {
            border-color: var(--accent-blue);
        }

        /* ═══════ RESULTS PANEL ═══════ */
        .result-panel {
            margin-top: 20px;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(12px)
            }

            to {
                opacity: 1;
                transform: none
            }
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .result-header h3 {
            font-size: 16px;
            font-weight: 700;
        }

        .result-header .meta {
            color: var(--text-muted);
            font-size: 12px;
        }

        /* ═══════ RISK BADGE ═══════ */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        .badge-none {
            background: rgba(0, 230, 118, 0.12);
            color: var(--risk-none);
            border: 1px solid rgba(0, 230, 118, 0.3);
        }

        .badge-low {
            background: rgba(105, 240, 174, 0.12);
            color: var(--risk-low);
            border: 1px solid rgba(105, 240, 174, 0.3);
        }

        .badge-medium {
            background: rgba(255, 193, 7, 0.12);
            color: var(--risk-medium);
            border: 1px solid rgba(255, 193, 7, 0.3);
        }

        .badge-high {
            background: rgba(255, 82, 82, 0.12);
            color: var(--risk-high);
            border: 1px solid rgba(255, 82, 82, 0.3);
        }

        .badge-vhigh {
            background: rgba(224, 64, 251, 0.12);
            color: var(--risk-very-high);
            border: 1px solid rgba(224, 64, 251, 0.3);
        }

        /* ═══════ DOMINIO/DIMENSION TABLE ═══════ */
        .dim-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 4px;
        }

        .dim-table th {
            text-align: left;
            padding: 8px 12px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .dim-table td {
            padding: 10px 12px;
            background: var(--bg-secondary);
            font-size: 13px;
        }

        .dim-table tr td:first-child {
            border-radius: 8px 0 0 8px;
        }

        .dim-table tr td:last-child {
            border-radius: 0 8px 8px 0;
        }

        .progress-mini {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-mini .fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.4s ease;
        }

        /* ═══════ TABS ═══════ */
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 20px;
        }

        .tab {
            padding: 8px 18px;
            border-radius: 10px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab.active {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            color: #fff;
        }

        .tab:hover:not(.active) {
            background: var(--bg-card);
            color: var(--text-primary);
        }

        /* ═══════ RANKING BAR ═══════ */
        .ranking-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .ranking-item:last-child {
            border-bottom: none;
        }

        .ranking-num {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .ranking-name {
            flex: 1;
            font-size: 13px;
        }

        .ranking-bar-wrapper {
            width: 200px;
            flex-shrink: 0;
        }

        .ranking-score {
            width: 50px;
            text-align: right;
            font-size: 14px;
            font-weight: 700;
            flex-shrink: 0;
        }

        /* ═══════ LOADING ═══════ */
        .loader {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .loader.active {
            display: block;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid var(--border);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state .icon-big {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .empty-state p {
            font-size: 14px;
        }

        /* ═══════ NOTIFICATION ═══════ */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 20px;
            z-index: 200;
            box-shadow: var(--shadow);
            display: none;
            animation: slideIn 0.3s ease;
        }

        .toast.show {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(20px)
            }

            to {
                opacity: 1;
                transform: none
            }
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <header class="header" id="app-header">
        <div class="header-title">
            <div class="icon">🧠</div>
            <div>
                <h1>Análisis Psicosocial</h1>
                <small>Batería de Riesgo Psicosocial — MinTrabajo Colombia</small>
            </div>
        </div>
        <div class="header-actions">
            <button class="btn btn-ghost btn-sm" onclick="reloadBaremos()">🔄 Recargar Baremos</button>
            <button class="btn btn-ghost btn-sm" onclick="window.location.href='/'">← Volver</button>
        </div>
    </header>

    <div class="container">

        <!-- TABS -->
        <div class="tabs" id="main-tabs">
            <button class="tab active" data-tab="individual" onclick="switchTab('individual')">👤 Individual</button>
            <button class="tab" data-tab="group" onclick="switchTab('group')">👥 Grupal</button>
        </div>

        <!-- ═══════════════════════════════════════════ -->
        <!-- TAB: INDIVIDUAL                            -->
        <!-- ═══════════════════════════════════════════ -->
        <div id="tab-individual">
            <div class="lookup-section">
                <div class="card-title"><span class="dot"></span> Buscar Respondente</div>
                <div class="lookup-row">
                    <div class="field">
                        <label>Número de Cédula</label>
                        <input type="text" id="cedula-input" placeholder="Ej: 1234567890"
                            onkeydown="if(event.key==='Enter') searchIndividual()">
                    </div>
                    <button class="btn btn-primary" onclick="searchIndividual()">🔍 Analizar</button>
                    <button class="btn btn-ghost" id="btn-pdf-individual" style="display:none"
                        onclick="downloadPdfIndividual()">📄 PDF</button>
                </div>
            </div>

            <div class="loader" id="loader-individual">
                <div class="spinner"></div>
                <div style="color:var(--text-muted);font-size:13px;">Calculando análisis...</div>
            </div>

            <div id="individual-results" style="display:none;"></div>

            <div class="empty-state" id="empty-individual">
                <div class="icon-big">📊</div>
                <p>Ingresa una cédula para ver el análisis individual</p>
            </div>
        </div>

        <!-- ═══════════════════════════════════════════ -->
        <!-- TAB: GRUPAL                                -->
        <!-- ═══════════════════════════════════════════ -->
        <div id="tab-group" style="display:none;">
            <div class="filter-bar">
                <label>FILTROS:</label>
                <input type="text" id="filter-area" placeholder="Área / Departamento">
                <input type="text" id="filter-cargo" placeholder="Cargo">
                <select id="filter-sexo">
                    <option value="">Todos los sexos</option>
                    <option value="M">Masculino</option>
                    <option value="F">Femenino</option>
                </select>
                <button class="btn btn-primary" onclick="loadGroupAnalysis()">📊 Analizar Grupo</button>
                <button class="btn btn-ghost" id="btn-pdf-group" style="display:none" onclick="downloadPdfGroup()">📄
                    PDF Grupal</button>
                <button class="btn btn-primary" style="background-color: var(--accent-purple);"
                    onclick="window.open('/cuestionarios/reporte-grupal-total.html', '_blank')">📑 Ver Reporte Total
                    (HTML)</button>
            </div>

            <div class="loader" id="loader-group">
                <div class="spinner"></div>
                <div style="color:var(--text-muted);font-size:13px;">Agregando resultados grupales...</div>
            </div>

            <div id="group-results" style="display:none;"></div>

            <div class="empty-state" id="empty-group">
                <div class="icon-big">👥</div>
                <p>Aplica filtros y presiona "Analizar Grupo" para ver resultados agregados</p>
            </div>
        </div>

    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"><span id="toast-text"></span></div>

    <script>
        // ═══════════════════════════════════════════════════════
        // CONFIG
        // ═══════════════════════════════════════════════════════
        const API = '/cuestionarios/api/analisis';

        // Helpers
        const $ = id => document.getElementById(id);
        const show = el => { if (typeof el === 'string') el = $(el); el.style.display = ''; };
        const hide = el => { if (typeof el === 'string') el = $(el); el.style.display = 'none'; };

        function toast(msg, duration = 3000) {
            const t = $('toast');
            $('toast-text').textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), duration);
        }

        function badgeClass(nivel) {
            const map = { 'Sin Riesgo': 'badge-none', 'Bajo': 'badge-low', 'Medio': 'badge-medium', 'Alto': 'badge-high', 'Muy Alto': 'badge-vhigh' };
            return map[nivel] || 'badge-medium';
        }

        function riskColor(nivel) {
            const map = { 'Sin Riesgo': 'var(--risk-none)', 'Bajo': 'var(--risk-low)', 'Medio': 'var(--risk-medium)', 'Alto': 'var(--risk-high)', 'Muy Alto': 'var(--risk-very-high)' };
            return map[nivel] || 'var(--text-muted)';
        }

        function progressBar(score, color) {
            const w = Math.min(100, Math.max(0, score));
            return `<div class="progress-mini"><div class="fill" style="width:${w}%;background:${color}"></div></div>`;
        }

        // ═══════════════════════════════════════════════════════
        // TABS
        // ═══════════════════════════════════════════════════════
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
            hide('tab-individual'); hide('tab-group');
            show('tab-' + tab);
        }

        // ═══════════════════════════════════════════════════════
        // INDIVIDUAL ANALYSIS
        // ═══════════════════════════════════════════════════════
        let _currentCedula = '';

        async function searchIndividual() {
            const cedula = $('cedula-input').value.trim();
            if (!cedula) { toast('⚠️ Ingresa una cédula'); return; }
            _currentCedula = cedula;

            hide('individual-results'); hide('empty-individual'); hide('btn-pdf-individual');
            show('loader-individual');

            try {
                const res = await fetch(`${API}/${cedula}`);
                const json = await res.json();
                if (!res.ok) throw new Error(json.detail || 'Error');
                renderIndividual(json.data);
                show('btn-pdf-individual');
            } catch (e) {
                $('individual-results').innerHTML = `<div class="empty-state"><div class="icon-big">❌</div><p>${e.message}</p></div>`;
                show('individual-results');
            } finally {
                hide('loader-individual');
            }
        }

        function renderIndividual(data) {
            const el = $('individual-results');
            const cuestionarios = data.cuestionarios || {};

            // KPIs
            let kpiHtml = '<div class="kpi-row">';
            const labels = { estres: 'Estrés', intralaboral: 'Intralaboral', extralaboral: 'Extralaboral' };
            for (const [key, label] of Object.entries(labels)) {
                const q = cuestionarios[key];
                if (!q || q.error) continue; // Skip if missing or if there was an error in scoring
                kpiHtml += `
          <div class="kpi">
            <div class="kpi-value" style="color:${riskColor(q.nivel_riesgo)}">${q.puntaje_transformado}</div>
            <div class="kpi-label">${label}</div>
            <div style="margin-top:8px"><span class="badge ${badgeClass(q.nivel_riesgo)}">${q.nivel_riesgo}</span></div>
          </div>`;
            }
            if (data.total_general) {
                const tg = data.total_general;
                kpiHtml += `
          <div class="kpi">
            <div class="kpi-value" style="color:${riskColor(tg.nivel_riesgo)}">${tg.puntaje_transformado}</div>
            <div class="kpi-label">Total General (${tg.forma})</div>
            <div style="margin-top:8px"><span class="badge ${badgeClass(tg.nivel_riesgo)}">${tg.nivel_riesgo}</span></div>
          </div>`;
            }
            kpiHtml += '</div>';

            // Person info
            let headerHtml = `
        <div class="result-header">
          <div>
            <h3>${data.nombre || 'Respondente'}</h3>
            <div class="meta">Cédula: ${data.cedula} · Cargo: ${data.cargo || '—'} · Área: ${data.area || '—'}</div>
          </div>
          <div class="meta">${new Date(data.calculado_en).toLocaleString('es-CO')}</div>
        </div>`;

            // Detail sections
            let detailHtml = '';

            // Estrés detail
            if (cuestionarios.estres) {
                const q = cuestionarios.estres;
                detailHtml += `
          <div class="card" style="margin-bottom:20px;">
            <div class="card-title"><span class="dot" style="background:${riskColor(q.nivel_riesgo)}"></span> Cuestionario de Estrés</div>
            <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px;">
              <div style="background:var(--bg-secondary);padding:12px;border-radius:10px;text-align:center;">
                <div style="font-size:18px;font-weight:700;">${q.bloque1_raw}</div><small style="color:var(--text-muted);">Síntomas Fisiológicos</small></div>
              <div style="background:var(--bg-secondary);padding:12px;border-radius:10px;text-align:center;">
                <div style="font-size:18px;font-weight:700;">${q.paso_b}</div><small style="color:var(--text-muted);">Síntomas de Comportamiento</small></div>
              <div style="background:var(--bg-secondary);padding:12px;border-radius:10px;text-align:center;">
                <div style="font-size:18px;font-weight:700;">${q.paso_c}</div><small style="color:var(--text-muted);">Síntomas Intelectuales</small></div>
              <div style="background:var(--bg-secondary);padding:12px;border-radius:10px;text-align:center;">
                <div style="font-size:18px;font-weight:700;">${q.paso_d}</div><small style="color:var(--text-muted);">Síntomas Psicoemocionales</small></div>
            </div>
          </div>`;
            }

            // Intralaboral detail
            if (cuestionarios.intralaboral) {
                const q = cuestionarios.intralaboral;
                detailHtml += `<div class="card" style="margin-bottom:20px;">
          <div class="card-title"><span class="dot" style="background:${riskColor(q.nivel_riesgo)}"></span> Intralaboral Forma ${q.forma}</div>`;
                for (const [domName, domData] of Object.entries(q.dominios || {})) {
                    detailHtml += `
            <div style="margin-bottom:16px;">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                <span style="font-weight:700;font-size:13px;">${domName}</span>
                <span class="badge ${badgeClass(domData.nivel_riesgo)}">${domData.puntaje_transformado} — ${domData.nivel_riesgo}</span>
              </div>
              <table class="dim-table">
                <thead><tr><th>Dimensión</th><th>Bruto</th><th>Transformado</th><th>Nivel</th></tr></thead><tbody>`;
                    for (const [dimName, dimData] of Object.entries(domData.dimensiones || {})) {
                        detailHtml += `
              <tr>
                <td>${dimName}</td>
                <td style="text-align:center">${dimData.puntaje_bruto}</td>
                <td>${progressBar(dimData.puntaje_transformado, riskColor(dimData.nivel_riesgo))} <small>${dimData.puntaje_transformado}</small></td>
                <td><span class="badge ${badgeClass(dimData.nivel_riesgo)}">${dimData.nivel_riesgo}</span></td>
              </tr>`;
                    }
                    detailHtml += '</tbody></table></div>';
                }
                detailHtml += '</div>';
            }

            // Extralaboral detail
            if (cuestionarios.extralaboral && !cuestionarios.extralaboral.error) {
                const q = cuestionarios.extralaboral;
                detailHtml += `<div class="card" style="margin-bottom:20px;">
          <div class="card-title"><span class="dot" style="background:${riskColor(q.nivel_riesgo)}"></span> Extralaboral</div>
          <table class="dim-table">
            <thead><tr><th>Dimensión</th><th>Bruto</th><th>Factor</th><th>Transformado</th><th>Nivel</th></tr></thead><tbody>`;
                for (const [dimName, dimData] of Object.entries(q.dimensiones || {})) {
                    detailHtml += `
            <tr>
              <td>${dimName}</td>
              <td style="text-align:center">${dimData.puntaje_bruto}</td>
              <td style="text-align:center">${dimData.factor_transformacion}</td>
              <td>${progressBar(dimData.puntaje_transformado, riskColor(dimData.nivel_riesgo))} <small>${dimData.puntaje_transformado}</small></td>
              <td><span class="badge ${badgeClass(dimData.nivel_riesgo)}">${dimData.nivel_riesgo}</span></td>
            </tr>`;
                }
                detailHtml += '</tbody></table></div>';
            }

            el.innerHTML = `<div class="result-panel">${headerHtml}${kpiHtml}${detailHtml}</div>`;
            show(el);
        }

        async function downloadPdfIndividual() {
            if (!_currentCedula) return;
            toast('📄 Generando PDF...');
            try {
                const res = await fetch(`${API}/${_currentCedula}/reporte-pdf`);
                if (!res.ok) throw new Error('Error generando PDF');
                const blob = await res.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = `reporte_${_currentCedula}.pdf`; a.click();
                URL.revokeObjectURL(url);
                toast('✅ PDF descargado');
            } catch (e) { toast('❌ ' + e.message); }
        }

        // ═══════════════════════════════════════════════════════
        // GROUP ANALYSIS
        // ═══════════════════════════════════════════════════════
        let _groupCharts = [];

        async function loadGroupAnalysis() {
            hide('group-results'); hide('empty-group');
            show('loader-group');
            _groupCharts.forEach(c => c.destroy()); _groupCharts = [];

            const params = new URLSearchParams();
            const area = $('filter-area').value.trim();
            const cargo = $('filter-cargo').value.trim();
            const sexo = $('filter-sexo').value;
            if (area) params.set('area', area);
            if (cargo) params.set('cargo', cargo);
            if (sexo) params.set('sexo', sexo);

            try {
                const res = await fetch(`${API}/grupo/resumen?${params}`);
                const json = await res.json();
                if (!res.ok) throw new Error(json.detail || 'Error');
                renderGroup(json.data);
                show('btn-pdf-group');
            } catch (e) {
                $('group-results').innerHTML = `<div class="empty-state"><div class="icon-big">❌</div><p>${e.message}</p></div>`;
                show('group-results');
            } finally {
                hide('loader-group');
            }
        }

        function renderGroup(data) {
            const el = $('group-results');
            const n = data.total_respondentes;

            // KPIs
            let kpiHtml = `<div class="kpi-row">
        <div class="kpi">
          <div class="kpi-value" style="color:var(--accent-cyan)">${n}</div>
          <div class="kpi-label">Respondentes</div>
        </div>`;
            const labels = { estres: 'Estrés', intralaboral: 'Intralaboral', extralaboral: 'Extralaboral' };
            for (const [key, label] of Object.entries(labels)) {
                const q = data.cuestionarios?.[key];
                if (!q) continue;
                kpiHtml += `
          <div class="kpi">
            <div class="kpi-value">${q.promedio_transformado}</div>
            <div class="kpi-label">${label} (n=${q.n})</div>
          </div>`;
            }
            kpiHtml += '</div>';

            // Risk distribution charts
            let chartsHtml = '<div class="grid-3">';
            let chartIdx = 0;
            for (const [key, label] of Object.entries(labels)) {
                const q = data.cuestionarios?.[key];
                if (!q) continue;
                const canvasId = `chart-dist-${chartIdx++}`;
                chartsHtml += `
          <div class="card">
            <div class="card-title"><span class="dot"></span> ${label}</div>
            <canvas id="${canvasId}" height="200"></canvas>
          </div>`;
            }
            chartsHtml += '</div>';

            // Ranking
            let rankHtml = '<div class="card" style="margin-bottom:20px;"><div class="card-title"><span class="dot" style="background:var(--accent-orange)"></span> Ranking de Dimensiones con Mayor Riesgo</div>';
            const ranking = data.ranking_dimensiones || [];
            if (ranking.length === 0) {
                rankHtml += '<div style="color:var(--text-muted);font-size:13px;padding:16px;">Sin datos de dimensiones</div>';
            } else {
                for (let i = 0; i < ranking.length; i++) {
                    const d = ranking[i];
                    const color = d.promedio >= 70 ? 'var(--risk-high)' : d.promedio >= 50 ? 'var(--risk-medium)' : 'var(--risk-none)';
                    rankHtml += `
            <div class="ranking-item">
              <div class="ranking-num">${i + 1}</div>
              <div class="ranking-name">${d.dimension}</div>
              <div class="ranking-bar-wrapper">${progressBar(d.promedio, color)}</div>
              <div class="ranking-score" style="color:${color}">${d.promedio}</div>
            </div>`;
                }
            }
            rankHtml += '</div>';

            // Detailed Dimension Tables
            let tablesHtml = '<div style="margin-top: 30px; margin-bottom: 20px;"><h2>Resultados Detallados por Cuestionario</h2></div>';
            for (const [key, label] of Object.entries(labels)) {
                const q = data.cuestionarios?.[key];
                if (!q || !q.dimensiones || Object.keys(q.dimensiones).length === 0) continue;

                tablesHtml += `<div class="card" style="margin-bottom:20px;">
                  <div class="card-title"><span class="dot" style="background:var(--accent-blue)"></span> ${label} — Promedios</div>
                  <table class="dim-table" style="width: 100%; text-align: left; border-collapse: collapse; margin-top: 10px;">
                    <thead>
                      <tr style="border-bottom: 1px solid var(--border); color: var(--text-muted);">
                        <th style="padding: 10px;">Dimensión</th>
                        <th style="padding: 10px;">Promedio Transformado</th>
                        <th style="padding: 10px;">Respondieron (n)</th>
                      </tr>
                    </thead>
                    <tbody>`;

                for (const [dimName, d] of Object.entries(q.dimensiones)) {
                    const color = d.promedio_transformado >= 70 ? 'var(--risk-high)' : d.promedio_transformado >= 50 ? 'var(--risk-medium)' : 'var(--risk-none)';
                    tablesHtml += `
                      <tr style="border-bottom: 1px solid var(--border);">
                        <td style="padding: 10px; font-weight: 500;">${dimName} ${d.dominio ? `<span style="font-size: 11px; color: var(--text-muted); display: block;">${d.dominio}</span>` : ''}</td>
                        <td style="padding: 10px; display: flex; align-items: center; gap: 10px;">
                            ${progressBar(d.promedio_transformado, color)} 
                            <span style="font-weight: 600; width: 40px; color: ${color};">${d.promedio_transformado}</span>
                        </td>
                        <td style="padding: 10px; color: var(--text-secondary);">${d.n}</td>
                      </tr>`;
                }
                tablesHtml += `</tbody></table></div>`;
            }

            // Demographics
            let demoHtml = '<div class="grid-2">';
            const demoLabels = { sexo: 'Sexo', area: 'Área', tipo_cargo: 'Tipo de Cargo', nivel_estudios: 'Nivel de Estudios' };
            const demoColors = ['var(--accent-blue)', 'var(--accent-purple)', 'var(--accent-cyan)', 'var(--accent-orange)'];
            let demoIdx = 0;
            for (const [field, flabel] of Object.entries(demoLabels)) {
                const counts = data.demografico?.[field];
                if (!counts || Object.keys(counts).length === 0) continue;
                const canvasId = `chart-demo-${demoIdx++}`;
                demoHtml += `<div class="card"><div class="card-title"><span class="dot" style="background:${demoColors[demoIdx % 4]}"></span> ${flabel}</div><canvas id="${canvasId}" height="180"></canvas></div>`;
            }
            demoHtml += '</div>';

            el.innerHTML = `<div class="result-panel">${kpiHtml}${chartsHtml}${rankHtml}${tablesHtml}${demoHtml}</div>`;
            show(el);

            // Render charts after DOM is ready
            requestAnimationFrame(() => {
                // Distribution charts
                chartIdx = 0;
                for (const [key, label] of Object.entries(labels)) {
                    const q = data.cuestionarios?.[key];
                    if (!q) continue;
                    const canvasId = `chart-dist-${chartIdx++}`;
                    const ctx = document.getElementById(canvasId);
                    if (!ctx) continue;
                    const dist = q.distribucion || {};
                    const niveles = ['Sin Riesgo', 'Bajo', 'Medio', 'Alto', 'Muy Alto'];
                    const colors = ['#00e676', '#69f0ae', '#ffc107', '#ff5252', '#e040fb'];
                    const chart = new Chart(ctx, {
                        type: 'doughnut',
                        data: {
                            labels: niveles,
                            datasets: [{
                                data: niveles.map(n => dist[n] || 0),
                                backgroundColor: colors,
                                borderWidth: 0,
                                borderRadius: 4,
                            }]
                        },
                        options: {
                            responsive: true,
                            plugins: {
                                legend: { position: 'bottom', labels: { color: '#475569', font: { size: 11 } } }
                            },
                            cutout: '60%',
                        }
                    });
                    _groupCharts.push(chart);
                }

                // Demo charts
                demoIdx = 0;
                for (const [field, flabel] of Object.entries(demoLabels)) {
                    const counts = data.demografico?.[field];
                    if (!counts || Object.keys(counts).length === 0) continue;
                    const canvasId = `chart-demo-${demoIdx++}`;
                    const ctx = document.getElementById(canvasId);
                    if (!ctx) continue;
                    const entries = Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 8);
                    const chart = new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: entries.map(e => e[0]),
                            datasets: [{
                                data: entries.map(e => e[1]),
                                backgroundColor: 'rgba(37, 99, 235, 0.6)',
                                borderRadius: 6,
                            }]
                        },
                        options: {
                            responsive: true,
                            indexAxis: 'y',
                            plugins: { legend: { display: false } },
                            scales: {
                                x: { grid: { color: 'rgba(0,0,0,0.04)' }, ticks: { color: '#475569', font: { size: 11 } } },
                                y: { grid: { display: false }, ticks: { color: '#1e293b', font: { size: 11 } } },
                            }
                        }
                    });
                    _groupCharts.push(chart);
                }
            });
        }

        async function downloadPdfGroup() {
            toast('📄 Generando PDF grupal...');
            const params = new URLSearchParams();
            const area = $('filter-area').value.trim();
            const cargo = $('filter-cargo').value.trim();
            const sexo = $('filter-sexo').value;
            if (area) params.set('area', area);
            if (cargo) params.set('cargo', cargo);
            if (sexo) params.set('sexo', sexo);
            try {
                const res = await fetch(`${API}/grupo/reporte-pdf?${params}`, { method: 'POST' });
                if (!res.ok) throw new Error('Error');
                const blob = await res.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = 'reporte_grupal.pdf'; a.click();
                URL.revokeObjectURL(url);
                toast('✅ PDF grupal descargado');
            } catch (e) { toast('❌ ' + e.message); }
        }

        // ═══════════════════════════════════════════════════════
        // BAREMOS
        // ═══════════════════════════════════════════════════════
        async function reloadBaremos() {
            try {
                const res = await fetch(`${API}/baremos/recargar`, { method: 'POST' });
                if (!res.ok) throw new Error('Error');
                toast('✅ Baremos recargados correctamente');
            } catch (e) { toast('❌ ' + e.message); }
        }
    </script>
</body>

</html>
